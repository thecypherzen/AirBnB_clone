<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width initial-scale=1.0"/>
		<meta name="description" content="Task 7 > Display results| Airbnb Clone"/>
		<link rel="stylesheet" href="styles/4-common.css" />
		<link rel="stylesheet" href="styles/6-filters.css" />
		<link rel="stylesheet" href="styles/3-header.css" />
		<link rel="stylesheet" href="styles/3-footer.css"/>
		<link rel="stylesheet" href="styles/7-places.css"/>
		<link rel="icon" type="image/x-icon" href="images/icon.png">
		<title>
			Task 7 | Display results | Airbnb - Web Static
		</title>
	</head>

	<body>
		<header>
			<div id="logo">
				<a href="7-index.html" role="button" tabindex="0"
					aria-label="Airbnb clone Logo. Click to return to home page.">
				</a>
			</div>
		</header>

		<div class="content-wrapper">
			<div class="container">
				<section class="filters">
					<div class="locations-filter">
						<h3 class="margin-0">States</h3>
						<h4 class="margin-0">Lorem, dolor...</h4>
						<ul class="hidden popover no-list">
							<div class="popover-group">
								<h2>State-1</h2>
								<ul class="no-list">
									<li>City-1</li>
									<li>City-2</li>
								</ul>
							</div>
							<div class="popover-group">
								<h2>State-1</h2>
								<ul class="no-list">
									<li>City-1</li>
									<li>City-2</li>
								</ul>
							</div>
						</ul>
					</div>
					<div class="amenities-filter">
						<h3 class="margin-0">Amenities</h3>
						<h4 class="margin-0">Lorem, dolor, sit...</h4>
						<ul class="hidden popover no-list">
							<div class="popover-group">
								<li>Item-1</li>
								<li>Item-2</li>
								<li>Item-3</li>
							</div>
						</ul>
					</div>
					<div class="filter-blank"></div>
					<!--<input type="text" name="filters" id="filters">-->
					<button class="btn btn-primary btn-rounded">Search</button>
				</section>

				<!-- Places -->
				<section class="places">
					<h1>Places</h1>
					<article class="place-item"><h2>Place One</h2></article>
					<article class="place-item"><h2>Place Two</h2></article>
					<article class="place-item"><h2>Place Three</h2></article>
				</section>
			</div>
		</div>
		<footer>
			<p>Best School</p>
		</footer>
	</body>
</html>
