<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width initial-scale=1.0">
		<meta name="description" content="Random css and html notes to remember">
		<title>
			CSS and HTML Reference Notes
		</title>
		<style>
			#container{
				background: #333;
				height: 70vh;
				display: flex;
				/*flex-wrap: wrap;*/
				/*flex-direction: column; /* row, row-reverse */
				flex-flow: row wrap; /*short hand for f_direction and f_wrap.*/
				justify-content: space-evenly;
				align-items: center; /* OPTs: flex-start, flex-end, baseline*/

			}
			.item{
				background: #f4f4f4;
				border: 1px #ccc solid;
				border-radius: 4px;
				/*flex: 1;*/
				margin: 10px;
				padding: 1rem;
				text-align: center;
				flex-basis: 200px; /* set width of each item*/
				/* align-content: flex_start, flex_end, center, space-between
					etc... used to align vertically when there's extra space.
				*/
			}
			.item-1{
				align-self: space-between;
				order:2;
			}
			.form-group{
				padding-block: 10px;
			}
			.is-required:after{
				content: '*';
				padding-left: 3px;
				margin-top: 5px;
				color: red;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<div class="item item-1">
				<h3>Item 1</h3>
			</div>
			<div class="item item-2">
				<h3>Item 2</h3>
			</div>
			<div class="item item-3">
				<h3>Item 3</h3>
			</div>
			<div class="item item-4">
				<h3>Item 4</h3>
			</div>
		</div>
		<div class="form-group">
			<label class="is-required" for="name">Enter Name</label>
			<input type="text">
		</div>
	</body>
</html>
